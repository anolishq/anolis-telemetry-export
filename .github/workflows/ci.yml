name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-upstream-schema:
    name: Verify Upstream Telemetry Schema Lock
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect lock mode
        id: lock_mode
        run: |
          MODE=$(python3 -c "import json; from pathlib import Path; lock=json.loads(Path('contracts/upstream/anolis/telemetry-timeseries.lock.json').read_text(encoding='utf-8')); dist=lock.get('distribution', {}) if isinstance(lock, dict) else {}; print(dist.get('mode', 'manual-copy') if isinstance(dist, dict) else 'manual-copy')")
          echo "mode=${MODE}" >> "$GITHUB_OUTPUT"
          echo "Detected lock mode: ${MODE}"

      - name: Verify vendored upstream schema checksum
        run: |
          python3 scripts/verify-upstream-schema.py

      - name: Enforce release-artifact verification when pinned
        if: steps.lock_mode.outputs.mode == 'release-artifact'
        run: |
          python3 scripts/verify-upstream-schema.py --require-release-artifact

  python-lint:
    name: Python Linting (ruff)
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python and dependencies
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-lock.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt

      - name: Run ruff checks
        run: |
          ruff check . --output-format=github
          ruff format --check .

  python-typecheck:
    name: Python Type Checking (mypy)
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python and dependencies
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-lock.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt

      - name: Run mypy
        run: |
          mypy tools/telemetry_export tests/integration

  python-tests:
    name: Python Tests (export service unit)
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python and dependencies
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-lock.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt

      - name: Run telemetry export unit tests
        run: |
          python -m pytest tests/integration/test_telemetry_export_service_unit.py -vv

  python-export-e2e:
    name: Python Export E2E (Influx fixture)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    services:
      influxdb:
        image: influxdb:2.7
        ports:
          - 8086:8086
        env:
          DOCKER_INFLUXDB_INIT_MODE: setup
          DOCKER_INFLUXDB_INIT_USERNAME: admin
          DOCKER_INFLUXDB_INIT_PASSWORD: admin-password-change-me
          DOCKER_INFLUXDB_INIT_ORG: anolis
          DOCKER_INFLUXDB_INIT_BUCKET: anolis
          DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: dev-token
        options: >-
          --health-cmd "curl -f http://localhost:8086/health || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python and dependencies
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-lock.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt

      - name: Wait for InfluxDB readiness
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8086/health >/dev/null; then
              echo "InfluxDB is healthy"
              exit 0
            fi
            sleep 1
          done
          echo "InfluxDB did not become healthy in time" >&2
          exit 1

      - name: Run telemetry export e2e test
        env:
          ANOLIS_EXPORT_E2E: "1"
          ANOLIS_EXPORT_E2E_INFLUX_URL: "http://127.0.0.1:8086"
          ANOLIS_EXPORT_E2E_INFLUX_ORG: "anolis"
          ANOLIS_EXPORT_E2E_INFLUX_BUCKET: "anolis"
          ANOLIS_EXPORT_E2E_INFLUX_TOKEN: "dev-token"
        run: |
          python -m pytest tests/integration/test_telemetry_export_service_e2e.py -vv
