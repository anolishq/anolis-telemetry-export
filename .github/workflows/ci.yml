name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-upstream-schema:
    name: Verify Upstream Telemetry Schema Lock
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Detect lock mode
        id: lock_mode
        run: |
          MODE=$(python3 -c "import json; from pathlib import Path; lock=json.loads(Path('contracts/upstream/anolis/telemetry-timeseries.lock.json').read_text(encoding='utf-8')); dist=lock.get('distribution', {}) if isinstance(lock, dict) else {}; print(dist.get('mode', 'manual-copy') if isinstance(dist, dict) else 'manual-copy')")
          echo "mode=${MODE}" >> "$GITHUB_OUTPUT"
          echo "Detected lock mode: ${MODE}"

      - name: Verify vendored upstream schema checksum
        run: |
          python3 scripts/verify-upstream-schema.py

      - name: Enforce release-artifact verification when pinned
        if: steps.lock_mode.outputs.mode == 'release-artifact'
        run: |
          python3 scripts/verify-upstream-schema.py --require-release-artifact

  python-lint:
    name: Python Linting (ruff)
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: Run ruff checks
        run: |
          uv run ruff check . --output-format=github
          uv run ruff format --check .

  python-typecheck:
    name: Python Type Checking (mypy)
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: Run mypy
        run: uv run mypy telemetry_export tests/integration

  python-tests:
    name: Python Tests (export service unit, py${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        # Span the deployment Python floor (Raspberry Pi OS Bookworm ships 3.11)
        # through the current image (Trixie ships 3.13), so the export service is
        # proven installable+working across every Pi it targets. See
        # anolishq/anolis-telemetry-export#35 / anolishq/anolis#137.
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --locked --extra dev --python ${{ matrix.python-version }}

      - name: Run telemetry export unit tests
        run: |
          uv run --python ${{ matrix.python-version }} pytest \
            tests/integration/test_telemetry_export_service_unit.py \
            tests/integration/test_run_export_unit.py -vv

  python-export-e2e:
    name: Python Export E2E (Influx fixture)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    services:
      influxdb:
        image: influxdb:2.9@sha256:bfe360b59cb6a351a648cb2df37e559f0c0436248c2e05876cace58c26072ecc
        ports:
          - 8086:8086
        env:
          DOCKER_INFLUXDB_INIT_MODE: setup
          DOCKER_INFLUXDB_INIT_USERNAME: admin
          DOCKER_INFLUXDB_INIT_PASSWORD: admin-password-change-me
          DOCKER_INFLUXDB_INIT_ORG: anolis
          DOCKER_INFLUXDB_INIT_BUCKET: anolis
          DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: dev-token
        options: >-
          --health-cmd "curl -f http://localhost:8086/health || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: Wait for InfluxDB readiness
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8086/health >/dev/null; then
              echo "InfluxDB is healthy"
              exit 0
            fi
            sleep 1
          done
          echo "InfluxDB did not become healthy in time" >&2
          exit 1

      - name: Run telemetry export e2e test
        env:
          ANOLIS_EXPORT_E2E: "1"
          ANOLIS_EXPORT_E2E_INFLUX_URL: "http://127.0.0.1:8086"
          ANOLIS_EXPORT_E2E_INFLUX_ORG: "anolis"
          ANOLIS_EXPORT_E2E_INFLUX_BUCKET: "anolis"
          ANOLIS_EXPORT_E2E_INFLUX_TOKEN: "dev-token"
        run: uv run pytest tests/integration/test_telemetry_export_service_e2e.py -vv

  ok:
    name: ok
    if: always()
    needs:
      - verify-upstream-schema
      - python-lint
      - python-typecheck
      - python-tests
      - python-export-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Evaluate job results
        run: |
          echo "Job results: ${{ toJSON(needs.*.result) }}"
      - name: Fail if any required job failed or was cancelled
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
