server:
  host: 127.0.0.1
  port: 8091
  # Env override takes precedence when set:
  #   ANOLIS_EXPORT_AUTH_TOKEN
  auth_token: export-dev-token

influxdb:
  url: http://127.0.0.1:8086
  org: anolis
  bucket: anolis
  # Env override takes precedence when set:
  #   ANOLIS_EXPORT_INFLUX_TOKEN
  token: dev-token

# Optional request-scope guardrails:
# - when enforce_selector_scope=true, each non-empty allowed_* list becomes a hard
#   allowlist and callers must provide explicit selector values for that dimension.
authorization:
  enforce_selector_scope: false
  allowed_runtime_names: []
  allowed_provider_ids: []
  allowed_device_ids: []
  allowed_signal_ids: []

limits:
  max_span_seconds: 86400
  max_rows: 50000
  max_response_bytes: 10000000
  max_selector_items: 128
  request_timeout_seconds: 15
  max_request_bytes: 200000
